<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    }
    #content {
      width: 100%;
      min-height: 100vh;
      padding: 5vh 5vw;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.6;
      font-size: 72px;
      will-change: transform;
    }
    .paused-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ff4444;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .paused-indicator.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="paused-indicator" id="pausedIndicator"></div>
  <div id="content"></div>
  <script src="prompter.js"></script>
</body>
</html>
